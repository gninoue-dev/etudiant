  <!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Exercice 5 : Tableaux</title>
  <style>
    table {
      border-collapse: collapse;
      text-align: center;
    }
    td {
      border: 1px solid black;
      width: 50px;
      height: 40px;
    }
  </style>
</head>
<body>
 <table border="1" cellspacing="0" cellpadding="8">
  <tr>
    <!-- Cellule 1 occupe 3 colonnes -->
    <td colspan="3">1</td>
    <td></td>
  </tr>
  <tr>
    <td rowspan="2">4</td>
    <td>6</td>
    <td>8</td>
    <td></td>
  </tr>
  <tr>
    <td>7</td>
    <td></td>
    <td></td>
  </tr>
  <tr>
    <td rowspan="2">9</td>
    <td rowspan="2">5</td>
    <td>10</td>
    <td>12</td>
  </tr>
  <tr>
    <td>11</td>
    <td></td>
  </tr>
  <tr>
    <td>15</td>
    <td>16</td>
    <td>13</td>
    <td colspan="2">14</td>
  </tr>
</table>

</body>
