<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panier - GNINOU_FOOD</title>
    <link rel="stylesheet" href="panier.css">
    <link rel="icon" type="image/png" href="res/logo.png">
</head>
<body>
    <!-- En-tête -->
    <header class="entete">
        <div class="logo">
            <img src="res/logo.png" alt="GNINOU FOOD">
        </div>
        <!-- Lien retour unique -->
        <nav class="retour-accueil">
            <a href="Page.principale.html">Accueil</a>
        </nav>
    </header>

    <!-- Contenu principal -->
    <main class="conteneur-panier">
        <!-- Liste des produits -->
        <section class="articles-panier">
            <div id="cart-items"></div>
        </section>

        <!-- Résumé de commande -->
        <aside class="resume-panier">
            <h2>Résumé de commande</h2>
            <p class="sous-total" id="cart-subtotal">Sous-total : 0 FCFA</p>
            <p class="livraison" id="cart-shipping">Livraison : 0 FCFA</p>
            <p class="total-general" id="cart-total">Total : 0 FCFA</p>
            <button class="bouton commander" id="checkout-button">Commander</button>
            <button class="bouton vider" id="clear-cart-button">Vider le panier</button>
            <p class="reassurance">Paiement sécurisé<br> Livraison rapide<br> Service client</p>
        </aside>
    </main>

    <!-- Pied de page -->
    <footer class="pied-page">
        <p>&copy; 2026 GNINOU_FOOD - Tous droits réservés</p>
    </footer>
</body>
</html>
