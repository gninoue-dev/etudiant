<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>
  <link rel="stylesheet" href="connexion.css">
  <link rel="icon" type="image/png" href="res/logo.png">
</head>
<body>
  <main>
    <div class="form-container">
      <!-- Logo -->
      <img src="res/logo.png" alt="GNINOU_FOOD" class="logo">
      
      <!-- Titre -->
      <h1>Connexion</h1>
      
      <!-- Formulaire de connexion -->
      <form action="traitement_connexion.php" method="get">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Email" required>
        
        <label for="password">Mot de passe</label>
        <div class="password-container">
          <input type="password" id="password" name="password" placeholder="Mot de passe" required>
          <button type="button" class="toggle-password" id="togglePassword">
            <i class="fa fa-eye"></i>
          </button>
        </div>

        <button type="submit" class="btn">Se connecter</button>
      </form>
      
      <!-- Redirection vers inscription -->
      <p class="redirect">
        Pas encore inscrit ? <a href="page_inscription.html">Créez un compte</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 GNINOU_FOOD - Tous droits réservés</p>
  </footer>

<script>
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    const icon = this.querySelector('i');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
});
</script>

</body>
</html>
