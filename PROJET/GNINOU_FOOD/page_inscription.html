<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription</title>
  <link rel="stylesheet" href="inscription.css">
  <link rel="icon" type="image/png" href="res/logo.png">
  <!-- Font Awesome : bibliothèque d'icônes en ligne -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <main>
    <div class="form-container">
      <img src="res/logo.png" alt="GNINOU_FOOD" class="logo">
      <h1>INSCRIPTION</h1>
      
      <form action="#" method="get">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" placeholder="Gninoue" required>
        
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="exemple@gmail.com" required>
        
        <label for="password">Mot de passe</label>
        <div class="password-container">
          <input type="password" id="password" name="password" placeholder="Mot de passe" required>
          <button type="button" class="toggle-password" id="togglePassword">
            <i class="fa fa-eye"></i>
          </button>
        </div>
        
        <button type="submit" class="btn">S'inscrire</button>
      </form>
      
      <p class="redirect">
        Déjà inscrit ?! <a href="page_connexion.html">Connectez-vous</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <div class="pied-page">
    <p>&copy; 2026 GNINOU_FOOD - Tous droits réservés</p>
  </div>

<script>
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    const icon = this.querySelector('i');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
});
</script>

</body>
</html>
